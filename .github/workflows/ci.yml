name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore WinCron.sln

      - name: Verify formatting
        run: dotnet format WinCron.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build WinCron.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test WinCron.sln --configuration Release --no-build

      - name: Publish self-contained executable
        run: dotnet publish WinCron.csproj --configuration Release --runtime win-x64 --self-contained true --no-restore --output artifacts/publish/win-x64

      - name: Smoke test published executable
        shell: pwsh
        run: |
          $version = & .\artifacts\publish\win-x64\wincron.exe --version
          if ($LASTEXITCODE -ne 0 -or $version -notmatch '^WinCron \d+\.\d+\.\d+$') {
            throw "Published executable smoke test failed: $version"
          }
