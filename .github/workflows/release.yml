name: Build installer and publish release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  deployments: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore and test
        run: |
          dotnet restore WinCron.sln
          dotnet test WinCron.sln --configuration Release --no-restore

      - name: Read project version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          [xml]$project = Get-Content WinCron.csproj
          $version = $project.Project.PropertyGroup.Version | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw 'WinCron.csproj does not define a Version.'
          }
          if ('${{ github.ref_type }}' -eq 'tag' -and '${{ github.ref_name }}' -ne "v$version") {
            throw "Tag ${{ github.ref_name }} does not match project version v$version."
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Publish WinCron
        run: dotnet publish WinCron.csproj --configuration Release --runtime win-x64 --self-contained true --no-restore --output artifacts/publish/win-x64

      - name: Prepare release signing certificate
        if: github.ref_type == 'tag'
        id: signing
        shell: pwsh
        timeout-minutes: 1
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_BASE64)) {
            throw 'WINDOWS_SIGNING_CERTIFICATE_BASE64 is required for tagged releases.'
          }
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_PASSWORD)) {
            throw 'WINDOWS_SIGNING_CERTIFICATE_PASSWORD is required for tagged releases.'
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP 'wincron-signing.pfx'
          try {
            $certificateBytes = [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_BASE64)
          }
          catch {
            throw 'WINDOWS_SIGNING_CERTIFICATE_BASE64 is not valid Base64.'
          }

          if ($certificateBytes.Length -eq 0) {
            throw 'The decoded signing certificate is empty.'
          }

          [IO.File]::WriteAllBytes($certificatePath, $certificateBytes)
          if (!(Test-Path -LiteralPath $certificatePath -PathType Leaf)) {
            throw 'Failed to create the temporary signing certificate.'
          }

          "certificate_path=$certificatePath" >> $env:GITHUB_OUTPUT

      - name: Locate SignTool
        if: github.ref_type == 'tag'
        id: signtool
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $signTool = Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Filter signtool.exe -Recurse |
            Where-Object FullName -Match '\\x64\\signtool\.exe$' |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (!$signTool) {
            throw 'signtool.exe was not found.'
          }
          "path=$signTool" >> $env:GITHUB_OUTPUT

      - name: Sign WinCron executable
        if: github.ref_type == 'tag'
        shell: pwsh
        timeout-minutes: 5
        env:
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          $executable = 'artifacts\publish\win-x64\wincron.exe'

          if (!(Test-Path -LiteralPath $executable -PathType Leaf)) {
            throw "Executable not found: $executable"
          }

          & '${{ steps.signtool.outputs.path }}' sign `
            /fd SHA256 `
            /td SHA256 `
            /tr https://timestamp.digicert.com `
            /f '${{ steps.signing.outputs.certificate_path }}' `
            /p $env:SIGNING_CERTIFICATE_PASSWORD `
            $executable

          if ($LASTEXITCODE -ne 0) {
            throw "SignTool failed to sign WinCron (exit code $LASTEXITCODE)."
          }

          $signature = Get-AuthenticodeSignature -LiteralPath $executable
          if (!$signature.SignerCertificate) {
            throw 'The WinCron executable does not contain an Authenticode signature.'
          }

          Write-Host "Signed executable with certificate: $($signature.SignerCertificate.Subject)"
          Write-Host "Local trust status: $($signature.Status)"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --yes

      - name: Build single installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.version.outputs.version }}" installer\wincron.iss
          if ($LASTEXITCODE -ne 0) {
            throw "Inno Setup failed with exit code $LASTEXITCODE."
          }
          if (!(Test-Path -LiteralPath artifacts\installer\wincron-setup.exe -PathType Leaf)) {
            throw 'Inno Setup did not produce wincron-setup.exe.'
          }

      - name: Sign installer
        if: github.ref_type == 'tag'
        shell: pwsh
        timeout-minutes: 5
        env:
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = 'artifacts\installer\wincron-setup.exe'

          & '${{ steps.signtool.outputs.path }}' sign `
            /fd SHA256 `
            /td SHA256 `
            /tr https://timestamp.digicert.com `
            /f '${{ steps.signing.outputs.certificate_path }}' `
            /p $env:SIGNING_CERTIFICATE_PASSWORD `
            $installer

          if ($LASTEXITCODE -ne 0) {
            throw "SignTool failed to sign the installer (exit code $LASTEXITCODE)."
          }

          $signature = Get-AuthenticodeSignature -LiteralPath $installer
          if (!$signature.SignerCertificate) {
            throw 'The WinCron installer does not contain an Authenticode signature.'
          }

          Write-Host "Signed installer with certificate: $($signature.SignerCertificate.Subject)"
          Write-Host "Local trust status: $($signature.Status)"

      - name: Remove temporary signing certificate
        if: always() && github.ref_type == 'tag'
        shell: pwsh
        run: |
          $certificatePath = '${{ steps.signing.outputs.certificate_path }}'
          if (![string]::IsNullOrWhiteSpace($certificatePath) -and (Test-Path -LiteralPath $certificatePath)) {
            Remove-Item -LiteralPath $certificatePath -Force
          }

      - name: Create SHA-256 checksum
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $hash = (Get-FileHash artifacts\installer\wincron-setup.exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  wincron-setup.exe" | Set-Content artifacts\installer\wincron-setup.exe.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wincron-setup
          path: |
            artifacts/installer/wincron-setup.exe
            artifacts/installer/wincron-setup.exe.sha256
          if-no-files-found: error

      - name: Publish GitHub Release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/installer/wincron-setup.exe
            artifacts/installer/wincron-setup.exe.sha256

      - name: Record successful GitHub Deployment
        if: github.ref_type == 'tag'
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'wincron-release',
              auto_merge: false,
              required_contexts: [],
              description: `WinCron installer ${{ steps.version.outputs.version }}`
            });
            if (deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: 'success',
                environment_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/tag/${context.ref.replace('refs/tags/', '')}`,
                description: 'Installer published to GitHub Releases'
              });
            }
